name: Aktualizowanie repozytoriów przez Tailscale

on:
  push:
  workflow_dispatch:

jobs:
  git-pull-all-repos:
    runs-on: ubuntu-latest

    env:
      TS_TAG: tag:github-actions
      REMOTE_USER: github-actions
      REMOTE_HOSTNAME: 100.67.200.23

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tailscale Setup - Połączenie do Tailnet'u
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: ${{ env.TS_TAG }}

      - name: Konfiguracja klucza SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.REMOTE_HOSTNAME }} >> ~/.ssh/known_hosts

      - name: Połączenie przez ssh jako github-actions
        run: |
          ssh -i ~/.ssh/id_rsa ${{ env.REMOTE_USER }}@${{ env.REMOTE_HOSTNAME }} <<'EOF'
            set -euo pipefail

            mapfile -t repos < <(
              find "$HOME" -type d -name .git -prune 2>/dev/null \
              | sed 's|/\.git$||' \
              | sort -u
            )

            if [ "${#repos[@]}" -eq 0 ]; then
              echo "Nie znaleziono żadnych sklonowanych repozytoriów."
              exit 0
            fi

            for repo in "${repos[@]}"; do
              if [ -d "$repo/.git" ]; then
                echo "Aktualizacja: $repo"
                git -C "$repo" pull --ff-only || echo "Błąd aktualizacji: $repo"
              fi
            done
          EOF
