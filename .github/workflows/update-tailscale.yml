name: Aktualizowanie repozytoriów przez Tailscale

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  workflow_dispatch:

jobs:
  git-pull-all-repos:
    runs-on: ubuntu-latest

    concurrency:
      group: git-pull-all-repos
      cancel-in-progress: false

    env:
      TS_TAG: tag:github-actions
      REMOTE_USER: github-actions
      REMOTE_HOSTNAME: 100.67.200.23
      REMOTE_REPO_ROOTS: /home/github-actions/repos /home/github-actions/projects

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tailscale Setup - Połączenie do Tailnet'u
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: ${{ env.TS_TAG }}

      - name: Konfiguracja klucza SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.REMOTE_HOSTNAME }} >> ~/.ssh/known_hosts

      - name: Połączenie przez ssh jako github-actions
        run: |
          ssh -i ~/.ssh/id_rsa ${{ env.REMOTE_USER }}@${{ env.REMOTE_HOSTNAME }} 'bash -s' <<'EOF'
            set -euo pipefail

            failed_repos=()
            repos=()
            read -r -a repo_roots <<< "${{ env.REMOTE_REPO_ROOTS }}"

            for root in "${repo_roots[@]}"; do
              if [ -d "$root" ]; then
                while IFS= read -r repo; do
                  repos+=("$repo")
                done < <(
                  find "$root" -type d -name .git -prune -print 2>/dev/null \
                  | sed 's|/\.git$||'
                )
              fi
            done

            if [ "${#repos[@]}" -eq 0 ]; then
              echo "Nie znaleziono żadnych sklonowanych repozytoriów w: ${repo_roots[*]}"
              exit 0
            fi

            for repo in "${repos[@]}"; do
              if [ -d "$repo/.git" ]; then
                echo "Aktualizacja: $repo"
                if ! git -C "$repo" pull --ff-only; then
                  failed_repos+=("$repo")
                fi
              fi
            done

            if [ "${#failed_repos[@]}" -gt 0 ]; then
              echo "Błąd aktualizacji repozytoriów:"
              printf '%s\n' "${failed_repos[@]}"
              exit 1
            fi
          EOF
